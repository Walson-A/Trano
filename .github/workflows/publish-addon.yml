name: Publier l'add-on

# À chaque changement livré sur main : build + publication sur la branche
# `release` (lue par Home Assistant). HA n'installe rien tout seul par ce
# biais — il détecte juste qu'une nouvelle version existe ; l'installation
# automatique se règle côté HA (interrupteur "Mise à jour automatique" sur
# l'add-on Trano). Voir deploy/README.md.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt (historique complet, nécessaire pour la branche release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Installer les dépendances
        run: npm ci

      - name: Identité git (pour le commit de release)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build + publication sur la branche release
        run: bash deploy/publish-addon.sh
