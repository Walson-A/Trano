name: Trano
# Numéro d'amorce uniquement (première publication). Ensuite, la version
# fait foi sur la branche `release` : deploy/publish-addon.sh l'y lit et
# l'incrémente. Modifier cette ligne n'a aucun effet sur les publications.
version: "1.1.1"
slug: trano
description: L'interface virtuelle de la famille — profils, courses, domotique
url: https://github.com/Walson-A/Trano
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
watchdog: http://[HOST]:[PORT:3001]/api/health
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: Interface web Trano
map: []
options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  weather_entity: "weather.forecast_home"
  openrouter_key: ""
  openrouter_model: "deepseek/deepseek-chat-v3.1:free"
schema:
  ha_url: url
  ha_token: password
  weather_entity: str
  openrouter_key: password
  openrouter_model: str
